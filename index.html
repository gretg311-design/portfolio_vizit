<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио Разработчика</title>
    <style>
        body {
            background-color: #121212; /* Глубокий темный цвет */
            color: #e0e0e0; /* Светлый текст, чтобы не резало глаза */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container { max-width: 800px; width: 100%; }
        h1 { color: #bb86fc; } /* Приятный фиолетовый акцент */
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .btn {
            display: inline-block;
            background: #03dac6; /* Мятный цвет для кнопок */
            color: #000;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Привет! Я [Имя парня]</h1>
        <p>Разработчик Telegram-ботов и мобильных игр.</p>

        <div class="card">
            <h3>Мой Character AI Бот</h3>
            <p>Умный собеседник с уникальным характером.</p>
            <a href="https://t.me/твой_бот" class="btn">Запустить бота</a>
        </div>

        <div class="card">
            <h3>Моя игра (Android)</h3>
            <p>Увлекательный геймплей прямо в твоем телефоне.</p>
            <a href="game.apk" class="btn">Скачать .APK</a>
        </div>
    </div>
</body>
</html>
