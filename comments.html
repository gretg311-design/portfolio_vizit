<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обсуждения | German</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        body {
            background-color: #0f0f12; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('background.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #e0e0e0; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 600px; width: 100%; }
        
        .header-box {
            text-align: center; margin-bottom: 20px; padding: 20px;
            background: rgba(187, 134, 252, 0.1); border-radius: 20px;
            border: 1px solid #bb86fc; backdrop-filter: blur(10px);
        }

        h1 { color: #bb86fc; font-size: 1.5em; margin: 0; }
        .rules-warning { color: #ffb300; font-size: 0.85em; margin-top: 10px; border-top: 1px solid rgba(255,179,0,0.2); padding-top: 10px; }

        /* Окно чата */
        #chat-window {
            background: rgba(20, 20, 20, 0.8);
            height: 450px; overflow-y: auto;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; display: flex; flex-direction: column; gap: 12px;
            margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .msg-bubble {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px; border-radius: 15px;
            border-bottom-left-radius: 2px; align-self: flex-start;
            max-width: 85%; position: relative;
        }

        .msg-bubble b { color: #03dac6; font-size: 0.85em; display: block; margin-bottom: 4px; }
        .msg-bubble span { line-height: 1.4; word-wrap: break-word; }

        /* Поля ввода */
        .input-group { display: flex; gap: 8px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; }
        
        input {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 10px; border-radius: 10px; outline: none;
        }

        #nickname { width: 100px; }
        #message { flex: 1; }

        .send-btn {
            background: #bb86fc; color: #000; border: none;
            padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); background: #03dac6; }

        .btn-back { color: #03dac6; text-decoration: none; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back">← Вернуться на главную</a>
        
        <div class="header-box">
            <h1>Обсуждения Проектов 💬</h1>
            <div class="rules-warning">
                <b>ПРАВИЛА:</b> Пиши свой @username! Причина обращения обязательна. 
                Пустые сообщения будут удалены модератором.
            </div>
        </div>

        <div id="chat-window">
            </div>

        <div class="input-group">
            <input type="text" id="nickname" placeholder="@ник" maxlength="15">
            <input type="text" id="message" placeholder="Что случилось? Опиши причину..." maxlength="200">
            <button class="send-btn" id="send">📡</button>
        </div>
    </div>

    <script>
        // Инициализация базы данных (используем публичные реле)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const chat = gun.get('german_secret_birthday_chat_2026').get('messages');

        const inputNick = document.getElementById('nickname');
        const inputMsg = document.getElementById('message');
        const btnSend = document.getElementById('send');
        const chatWindow = document.getElementById('chat-window');

        // Отправка сообщения
        btnSend.onclick = function() {
            if (!inputMsg.value) return;
            
            chat.set({
                name: inputNick.value || 'Аноним',
                text: inputMsg.value,
                time: Date.now()
            });
            inputMsg.value = '';
        };

        // Слушаем новые сообщения
        chat.map().once(function(data, id) {
            if (!data || !data.text) return;
            
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<b>${data.name}</b> <span>${data.text}</span>`;
            chatWindow.appendChild(div);
            
            // Авто-скролл вниз
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // Отправка по Enter
        inputMsg.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                btnSend.click();
            }
        });
    </script>
</body>
</html>
