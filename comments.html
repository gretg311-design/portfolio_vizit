<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватный Мессенджер | German</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body {
            background-color: #0f0f12; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('background.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #e0e0e0; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 600px; width: 100%; }
        
        .header-box {
            text-align: center; margin-bottom: 20px; padding: 20px;
            background: rgba(187, 134, 252, 0.1); border-radius: 20px;
            border: 1px solid #bb86fc; backdrop-filter: blur(10px);
        }

        h1 { color: #bb86fc; font-size: 1.5em; margin: 0; }
        .rules { color: #ffb300; font-size: 0.8em; margin-top: 10px; line-height: 1.4; }

        #chat-window {
            background: rgba(20, 20, 20, 0.8);
            height: 450px; overflow-y: auto;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 20px;
        }

        .msg {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px; border-radius: 15px;
            align-self: flex-start; max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg b { color: #03dac6; font-size: 0.85em; display: block; }

        .input-group { display: flex; gap: 8px; }
        
        input {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 12px; border-radius: 12px; outline: none;
        }

        #nick { width: 100px; }
        #text { flex: 1; }

        .send-btn {
            background: #bb86fc; color: #000; border: none;
            padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .btn-back { color: #03dac6; text-decoration: none; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back">← На главную</a>
        
        <div class="header-box">
            <h1>Мессенджер Обсуждений 💬</h1>
            <div class="rules">
                Правила: пиши @username и причину обращения.<br>
                Спам удаляется лично German.
            </div>
        </div>

        <div id="chat-window"></div>

        <div class="input-group">
            <input type="text" id="nick" placeholder="@ник" maxlength="15">
            <input type="text" id="text" placeholder="Ваше сообщение..." maxlength="250">
            <button class="send-btn" id="send">📡</button>
        </div>
    </div>

    <script>
        // Твои проверенные данные из Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBNBRzc6CNETu0r62_dPOoGqKzc_uLrLiM",
            authDomain: "germangift-7fe83.firebaseapp.com",
            databaseURL: "https://germangift-7fe83-default-rtdb.firebaseio.com",
            projectId: "germangift-7fe83",
            storageBucket: "germangift-7fe83.firebasestorage.app",
            messagingSenderId: "156375203434",
            appId: "1:156375203434:web:2b7489c43fbe5fef891413"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const chatWindow = document.getElementById('chat-window');
        const inputNick = document.getElementById('nick');
        const inputText = document.getElementById('text');
        const btnSend = document.getElementById('send');

        // Логика отправки сообщения
        btnSend.onclick = function() {
            const name = inputNick.value || "Аноним";
            const message = inputText.value;
            
            if (!message) return;

            db.ref("messages").push().set({
                name: name,
                text: message,
                time: Date.now()
            }).then(() => {
                // Очищаем поле только после успешной отправки
                inputText.value = "";
            }).catch((error) => {
                console.error("Ошибка Firebase:", error);
            });
        };

        // Получение сообщений в реальном времени
        db.ref("messages").on("child_added", function(snapshot) {
            const data = snapshot.val();
            if (data && data.text) {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b>${data.name}</b><span>${data.text}</span>`;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        });

        // Отправка по нажатию Enter
        inputText.addEventListener("keypress", (e) => { 
            if(e.key === "Enter") btnSend.click(); 
        });
    </script>
</body>
</html>
