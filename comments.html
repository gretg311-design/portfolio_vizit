<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватный Мессенджер | German</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body {
            background-color: #0f0f12; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('background.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #e0e0e0; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 600px; width: 100%; }
        
        .header-box {
            text-align: center; margin-bottom: 20px; padding: 20px;
            background: rgba(187, 134, 252, 0.1); border-radius: 20px;
            border: 1px solid #bb86fc; backdrop-filter: blur(10px);
        }

        h1 { color: #bb86fc; font-size: 1.5em; margin: 0; }
        .rules { color: #ffb300; font-size: 0.8em; margin-top: 10px; line-height: 1.4; }

        #chat-window {
            background: rgba(20, 20, 20, 0.8);
            height: 450px; overflow-y: auto;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 20px;
        }

        .msg {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 16px; border-radius: 18px;
            align-self: flex-start; max-width: 85%;
            position: relative; animation: fadeIn 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg b a { color: #03dac6; text-decoration: none; font-weight: bold; }
        .msg span { display: block; margin-top: 5px; color: #efefef; }

        .del-btn {
            display: none; color: #ff4444; background: rgba(255,68,68,0.1); 
            border: 1px solid #ff4444; border-radius: 8px;
            font-size: 10px; cursor: pointer; padding: 4px 8px; margin-top: 8px;
            transition: 0.2s;
        }
        .del-btn:hover { background: #ff4444; color: #fff; }

        .input-group { display: flex; gap: 8px; width: 100%; }
        input {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 12px; border-radius: 12px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #bb86fc; }
        #nick { width: 120px; }
        #text { flex: 1; }

        .send-btn {
            background: #bb86fc; color: #000; border: none;
            padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .btn-back { color: #03dac6; text-decoration: none; font-weight: bold; font-size: 0.9em; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back">← На главную</a>
        
        <div class="header-box">
            <h1>Мессенджер Обсуждений 💬</h1>
            <div class="rules">
                Нажми на @username для перехода в Telegram.<br>
                Соблюдайте правила общения.
            </div>
        </div>

        <div id="chat-window"></div>

        <div class="input-group">
            <input type="text" id="nick" placeholder="@ник" maxlength="15">
            <input type="text" id="text" placeholder="Ваше сообщение..." maxlength="250">
            <button class="send-btn" id="send">📡</button>
        </div>
    </div>

    <script>
        // Секретный "ключ" (это слово "GermanAdmin" в кодировке Base64)
        // Чтобы изменить пароль, введи в консоли браузера btoa("твой_пароль") и вставь результат сюда
        const _k = "R2VybWFuQWRtaW4="; 

        const firebaseConfig = {
            apiKey: "AIzaSyBNBRzc6CNETu0r62_dPOoGqKzc_uLrLiM",
            authDomain: "germangift-7fe83.firebaseapp.com",
            databaseURL: "https://germangift-7fe83-default-rtdb.firebaseio.com",
            projectId: "germangift-7fe83",
            storageBucket: "germangift-7fe83.firebasestorage.app",
            messagingSenderId: "156375203434",
            appId: "1:156375203434:web:2b7489c43fbe5fef891413"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const chatWindow = document.getElementById('chat-window');
        const inputNick = document.getElementById('nick');
        const inputText = document.getElementById('text');
        const btnSend = document.getElementById('send');

        let isAdmin = false;

        window.deleteMsg = function(id) {
            if (isAdmin) {
                db.ref("messages/" + id).remove();
            }
        };

        btnSend.onclick = function() {
            const name = inputNick.value || "Аноним";
            const message = inputText.value;
            
            if (!message) return;

            // Хакерская активация админки
            if (btoa(name) === _k && message === "/admin") {
                isAdmin = true;
                document.querySelectorAll('.del-btn').forEach(b => b.style.display = "block");
                inputText.value = "";
                alert("Режим модератора активирован");
                return;
            }

            db.ref("messages").push().set({
                name: name,
                text: message,
                time: Date.now()
            });
            inputText.value = "";
        };

        db.ref("messages").on("child_added", function(snapshot) {
            const data = snapshot.val();
            const id = snapshot.key;
            
            let cleanNick = data.name.replace('@', '');
            let nickLink = data.name.startsWith('@') 
                ? `<a href="https://t.me/${cleanNick}" target="_blank">${data.name}</a>` 
                : data.name;

            const div = document.createElement('div');
            div.className = 'msg';
            div.id = "msg-" + id;
            div.innerHTML = `
                <b>${nickLink}</b>
                <span>${data.text}</span>
                <button class="del-btn" onclick="deleteMsg('${id}')">Удалить 🗑️</button>
            `;
            chatWindow.appendChild(div);
            
            if (isAdmin) div.querySelector('.del-btn').style.display = "block";
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        db.ref("messages").on("child_removed", function(snapshot) {
            const el = document.getElementById("msg-" + snapshot.key);
            if (el) el.remove();
        });

        inputText.addEventListener("keypress", (e) => { if(e.key === "Enter") btnSend.click(); });
    </script>
</body>
</html>
